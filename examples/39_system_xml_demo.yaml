name: system_xml_demo
version: 1
stages:
- stage: xml
  jobs:
  - job: transforms
    steps:
    - step: set_name
      type: system.xml_set
      with:
        xml: '<app><settings mode="dev"><name>Procedo</name></settings></app>'
        path: 'settings/name'
        value: 'Procedo Runtime'
    - step: set_mode
      type: system.xml_set
      depends_on:
      - set_name
      with:
        xml: '${steps.set_name.outputs.xml}'
        path: 'settings/@mode'
        value: 'prod'
    - step: get_mode
      type: system.xml_get
      depends_on:
      - set_mode
      with:
        xml: '${steps.set_mode.outputs.xml}'
        path: 'settings/@mode'
    - step: print
      type: system.echo
      depends_on:
      - get_mode
      with:
        message: 'xml-mode=${steps.get_mode.outputs.value}'
