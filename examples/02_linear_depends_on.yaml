name: linear_depends_on
version: 1
stages:
- stage: build
  jobs:
  - job: pipeline
    steps:
    - step: download
      type: system.echo
      with: { message: "download" }
    - step: parse
      type: system.echo
      depends_on:
      - download
      with: { message: "parse" }
    - step: save
      type: system.echo
      depends_on:
      - parse
      with: { message: "save" }
