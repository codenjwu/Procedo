name: standard_build_template
version: 1

parameters:
  service_name:
    type: string
    required: true
  environment:
    type: string
    default: dev
  region:
    type: string
    default: eastus

variables:
  artifact_name: "${params.service_name}-${params.environment}-${params.region}"

stages:
- stage: build
  jobs:
  - job: package
    steps:
    - step: announce
      type: system.echo
      with:
        message: "Building ${vars.artifact_name}"
