name: max_parallelism_parity_demo
version: 1

stages:
- stage: parallel
  jobs:
  - job: bounded
    max_parallelism: 2
    steps:
    - step: sleep_a
      type: demo.sleep
      with:
        milliseconds: 250
    - step: sleep_b
      type: demo.sleep
      with:
        milliseconds: 250
    - step: sleep_c
      type: demo.sleep
      with:
        milliseconds: 250
    - step: sleep_d
      type: demo.sleep
      with:
        milliseconds: 250
    - step: done
      type: system.echo
      depends_on:
      - sleep_a
      - sleep_b
      - sleep_c
      - sleep_d
      with:
        message: "parallel batch done"
